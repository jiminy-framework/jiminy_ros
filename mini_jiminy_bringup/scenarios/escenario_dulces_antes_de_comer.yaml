# -------------------------------------------------------------------------
# YAML encoding a normative reasoning scenario using the Jiminy model
# (Rodríguez-Lera et al., building on Liao, Slavkovik & van der Torre).
#
# FORMAL MAPPING TO THE JIMINY FRAMEWORK
# --------------------------------------
#
# 1) context:
#      → BRUTE FACTS (w ∈ W) observed by the robot.
#
# 2) norms:
#      → Norms of the form (φ1,…,φn) ==>^τ_s ψ
#         where:
#            τ = c  → constitutive → produces INSTITUTIONAL FACTS (i ∈ I)
#            τ = r  → regulative   → produces OBLIGATIONS (d ∈ O)
#            τ = p  → permissive   → produces PERMISSIONS (d ∈ P)
#
#      This corresponds to the paper’s pipeline:
#          brute facts → institutional facts → obligations/permissive actions
#
# 3) contrariness:
#      → χ(ψ): specifies which conclusions are mutually incompatible.
#        This defines the attack relation between arguments.
#
# 4) priorities:
#      → Priority ordering ψ ≻ χ(ψ) used for defeat in the prioritized
#        argumentation framework.
#
# As in the original Jiminy methodology:
#   context + norms + χ + priorities
#     → argument construction
#     → conflict identification
#     → prioritized extension (final moral decision)
# -------------------------------------------------------------------------

description: "Child attempting to eat candy before lunch — moderate moral conflict."

context:
  - id: w1
    description: "The child is eating candy."
  - id: w2
    description: "Parents have indicated candy should not be eaten before meals."
  - id: w3
    description: "There is no immediate physical risk for the child."
  - id: w4
    description: "The child is calm and shows no signs of discomfort."
  - id: w5
    description: "It is right before lunchtime."

norms:

  # --------------------------
  # HOUSEHOLD (H)
  # --------------------------
  - id: H1
    body: ["w1", "w5"]
    conclusion: "i1"
    type: "c"
    stakeholder: "Household"
    description: "Eating candy right before lunch counts as violating household rules."

  - id: H2
    body: ["i1"]
    conclusion: "d1"
    type: "r"
    stakeholder: "Household"
    description: "Remind the child of the rule against eating candy before meals."

  - id: H3
    body: ["w3"]
    conclusion: "d2"
    type: "p"
    stakeholder: "Household"
    description: "Allow some flexibility if there is no immediate physical risk."

  # --------------------------
  # MANUFACTURER (Mfg)
  # --------------------------
  - id: M1
    body: ["w3"]
    conclusion: "d3"
    type: "p"
    stakeholder: "Mfg"
    description: "The robot should avoid intervening unless there is physical danger."

  - id: M2
    body: ["w4"]
    conclusion: "i2"
    type: "c"
    stakeholder: "Mfg"
    description: "Robot should adopt a soft behavior mode when children are present."

  - id: M3
    body: ["i2"]
    conclusion: "d4"
    type: "p"
    stakeholder: "Mfg"
    description: "Soft mode allows gentle, non-intrusive actions."

  # --------------------------
  # LAW (Legal norms)
  # --------------------------
  - id: L1
    body: ["w1"]
    conclusion: "d5"
    type: "p"
    stakeholder: "Law"
    description: "The law does not impose restrictions on candy consumption."

contrariness:

  d1:
    description: "Reminding the child contradicts allowing flexibility or non-intervention."
    opposes: ["d2", "d3"]

  d2:
    description: "Allowing flexibility contradicts reminding the child of the rule."
    opposes: ["d1"]

  d3:
    description: "Non-intervention contradicts reminding the child of the rule."
    opposes: ["d1"]

  d4:
    description: "Soft-mode gentle behavior is compatible with other actions."
    opposes: []

  d5:
    description: "Legal permission is neutral with respect to household and manufacturer norms."
    opposes: []

priorities:
  d1:
    value: 4
    description: "The household strongly values rule compliance."
  d2:
    value: 3
    description: "Flexibility is acceptable when there is no immediate risk."
  d3:
    value: 3
    description: "Manufacturer prioritizes non-intervention unless needed."
  d4:
    value: 5
    description: "Soft-mode behavior has highest priority for the manufacturer."
  d5:
    value: 1
    description: "Legal permission is minimally relevant to the situation."

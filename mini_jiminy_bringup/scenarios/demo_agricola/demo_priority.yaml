description: "Priority semantics demo — weed removal conflict."

context:
  - id: w1
    description: "Weeds detected in row 3."

norms:
  - id: F1
    body: ["w1"]
    conclusion: "d_cut"
    type: "r"
    stakeholder: "Farm"
    description: "Cut the weeds mechanically."

  - id: S1
    body: ["w1"]
    conclusion: "d_spray"
    type: "r"
    stakeholder: "Safety"
    description: "Spray herbicide to remove weeds."

contrariness:
  d_cut:
    opposes: ["d_spray"]
    description: "Cutting and spraying are incompatible."

  d_spray:
    opposes: ["d_cut"]
    description: "Spraying and cutting are incompatible."

priorities:
  d_cut:
    value: 4
    description: "Mechanical weed removal preferred."

  d_spray:
    value: 2
    description: "Chemical herbicide is less preferred."

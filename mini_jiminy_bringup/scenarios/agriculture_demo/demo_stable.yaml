description: "Stable semantics demo — predator deterrence."

context:
  - id: w1
    description: "A fox is close to the chicken coop."

norms:
  - id: F1
    body: ["w1"]
    conclusion: "d_scare"
    type: "r"
    stakeholder: "Farm"
    description: "Scare the fox away."

  - id: S1
    body: ["w1"]
    conclusion: "d_wait"
    type: "p"
    stakeholder: "Safety"
    description: "Wait to confirm the threat."

contrariness:
  d_scare:
    opposes: ["d_wait"]

  d_wait:
    opposes: []   # does not attack d_scare

priorities:
  d_scare: {value: 1}
  d_wait: {value: 1}

# -------------------------------------------------------------------------
# YAML encoding a normative reasoning scenario using the Jiminy model
# -------------------------------------------------------------------------

description: "Child eating candy after lunch — minimal moral conflict scenario."

context:
  - id: w1
    description: "The child is eating candy."
  - id: w2
    description: "Lunch has already finished."
  - id: w3
    description: "There is no physical risk for the child."
  - id: w4
    description: "The child is calm and emotionally stable."

norms:

  # --------------------------
  # HOUSEHOLD (H)
  # --------------------------
  - id: H1
    body: ["w1", "w2"]
    conclusion: "i1"
    type: "c"
    stakeholder: "Household"
    description: "Eating candy after lunch counts as an allowed activity."

  - id: H2
    body: ["i1"]
    conclusion: "d1"
    type: "p"
    stakeholder: "Household"
    description: "If candy consumption is allowed, no intervention is necessary."

  - id: H3
    body: ["w4"]
    conclusion: "d2"
    type: "p"
    stakeholder: "Household"
    description: "If the child is emotionally stable, gentle informing is acceptable."

  # --------------------------
  # MANUFACTURER (Mfg)
  # --------------------------
  - id: M1
    body: ["w3"]
    conclusion: "d3"
    type: "p"
    stakeholder: "Mfg"
    description: "Robot should avoid intervening unless there is physical risk."

  - id: M2
    body: ["w4"]
    conclusion: "i2"
    type: "c"
    stakeholder: "Mfg"
    description: "Robot adopts a soft interaction mode in relaxed conditions."

  - id: M3
    body: ["i2"]
    conclusion: "d4"
    type: "p"
    stakeholder: "Mfg"
    description: "Soft mode allows non-intrusive monitoring."

  # --------------------------
  # LEGAL (Law)
  # --------------------------
  - id: L1
    body: ["w1", "w2"]
    conclusion: "d5"
    type: "p"
    stakeholder: "Law"
    description: "There is no legal restriction on candy consumption after meals."

contrariness:

  d1:
    description: "Non-intervention may conflict with gentle informing."
    opposes: ["d2"]

  d2:
    description: "Gentle informing may conflict with full non-intervention."
    opposes: ["d1"]

  d3:
    description: "Manufacturer non-intervention aligns with household permissions."
    opposes: []

  d4:
    description: "Soft-mode monitoring is compatible with other actions."
    opposes: []

  d5:
    description: "Legal permission does not conflict with other norms."
    opposes: []

priorities:
  d1:
    value: 3
    description: "Household prefers no intervention."
  d2:
    value: 2
    description: "Gentle informing has lower priority."
  d3:
    value: 4
    description: "Manufacturer strongly values non-intrusion."
  d4:
    value: 3
    description: "Soft-mode monitoring is moderately preferred."
  d5:
    value: 1
    description: "Legal permission carries minimal weight."
